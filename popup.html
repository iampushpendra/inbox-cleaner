<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inbox Cleaner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ── Loading ─────────────────────────────────────────────────────────────── -->
<div id="screen-loading" class="screen">
  <div class="center-col">
    <div class="spinner"></div>
    <p class="muted">Connecting…</p>
  </div>
</div>

<!-- ── First-time / empty ───────────────────────────────────────────────────── -->
<div id="screen-empty" class="screen hidden">
  <div class="center-col">
    <div class="hero-icon">📥</div>
    <h2>Inbox Cleaner</h2>
    <p class="muted">Find out who's filling your Gmail<br>across every category — then delete them.</p>
    <button id="btn-first-scan" class="btn-primary btn-lg">Scan my inbox</button>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<div id="screen-main" class="screen hidden">

  <header class="header">
    <div class="header-left">
      <span class="logo">📥</span>
      <div>
        <div class="title">Inbox Cleaner</div>
        <span id="header-stats" class="subtitle"></span>
      </div>
    </div>
    <button id="btn-refresh" class="btn-icon" title="Re-scan inbox">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
    </button>
  </header>

  <!-- Scan progress bar (shown while scanning) -->
  <div id="scan-progress" class="scan-progress hidden">
    <div class="progress-bar"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>
    <span id="progress-text" class="progress-text">Scanning…</span>
  </div>

  <!-- Search + sort -->
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input id="search" type="search" placeholder="Search senders…" class="search-input" autocomplete="off" spellcheck="false">
    </div>
    <div class="sort-group">
      <button class="sort-btn active" data-sort="count">Most emails</button>
      <button class="sort-btn" data-sort="name">A → Z</button>
      <button class="sort-btn" data-sort="date">Recent</button>
    </div>
  </div>

  <!-- Sender list -->
  <div id="sender-list" class="sender-list"></div>

  <!-- Sticky action bar (visible when ≥1 selected) -->
  <div id="action-bar" class="action-bar hidden">
    <span id="action-summary" class="action-summary"></span>
    <div class="action-btns">
      <button id="btn-clear" class="btn-ghost">Clear</button>
      <button id="btn-delete" class="btn-danger">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Move to Trash
      </button>
    </div>
  </div>
</div>

<!-- ── Deleting progress ─────────────────────────────────────────────────────── -->
<div id="screen-deleting" class="screen hidden">
  <div class="center-col">
    <div class="spinner"></div>
    <p id="delete-text" class="muted delete-msg">Starting deletion…</p>
    <div class="progress-bar del-bar"><div id="delete-fill" class="progress-fill" style="width:0%"></div></div>
  </div>
</div>

<!-- ── Confirm modal ─────────────────────────────────────────────────────────── -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <div class="modal-icon">🗑️</div>
    <h3>Move to Trash?</h3>
    <p id="modal-text" class="muted"></p>
    <div class="modal-btns">
      <button id="btn-cancel" class="btn-ghost">Cancel</button>
      <button id="btn-confirm" class="btn-danger">Move to Trash</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
